<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #4facfe, #00f2fe);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .login-container {
        background: white;
        padding: 40px;
        border-radius: 15px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        width: 300px;
        text-align: center;
    }

    h2 {
        margin-bottom: 20px;
        color: #333;
    }

    input {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border: none;
        border-radius: 8px;
        background: #f1f1f1;
        font-size: 14px;
    }

    input:focus {
        outline: none;
        background: #e0e0e0;
    }

    button {
        width: 100%;
        padding: 12px;
        margin-top: 15px;
        border: none;
        border-radius: 8px;
        background: #4facfe;
        color: white;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #00c6ff;
    }
</style>

</head>
<body>

<div class="login-container">
    <h2>Login</h2>

    <input id="usuario" placeholder="Usuario">
    <input id="password" type="password" placeholder="Contraseña">

    <button onclick="login()">Ingresar</button>
</div>

<script>
function login(){

    const usuario = document.getElementById("usuario").value;
    const password = document.getElementById("password").value;

    fetch("/login", {
        method:"POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({usuario, password})
    })
    .then(r=>r.json())
    .then(data=>{

        if(data.ok){
            localStorage.setItem("logueado", "true");

            // 🔥 AQUÍ ESTÁ EL FIX
            window.location.href = "/index.html";

        }else{
            alert("❌ Usuario o contraseña incorrectos");
        }

    })
    .catch(()=> alert("Error en login"));
}
</script>

</body>
</html>
