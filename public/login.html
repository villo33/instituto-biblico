<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>iniciar sesion </title>

<meta name="theme-color" content="#007bff">
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/logo.jpg">



<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: radial-gradient(circle at top, #4facfe, #0f2027);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .login-container {
        backdrop-filter: blur(18px);
        background: rgba(10, 25, 50, 0.6);
        border-radius: 20px;
        padding: 45px;
        width: 320px;
        text-align: center;
        box-shadow: 
            0 0 25px rgba(79, 172, 254, 0.3),
            0 0 60px rgba(79, 172, 254, 0.2);
        border: 1px solid rgba(79, 172, 254, 0.3);
        animation: fadeIn 0.8s ease;
    }

    @keyframes fadeIn {
        from {opacity: 0; transform: translateY(30px);}
        to {opacity: 1; transform: translateY(0);}
    }

    h2 {
        margin-bottom: 25px;
        color: #4facfe;
        letter-spacing: 1px;
        text-shadow: 0 0 10px rgba(79,172,254,0.6);
    }

    input {
        width: 100%;
        padding: 12px;
        margin: 12px 0;
        border: 1px solid rgba(79,172,254,0.3);
        border-radius: 10px;
        background: rgba(255,255,255,0.05);
        color: #e6f7ff;
        font-size: 14px;
        transition: 0.3s;
    }

    input::placeholder {
        color: rgba(200,220,255,0.6);
    }

    input:focus {
        outline: none;
        border: 1px solid #4facfe;
        box-shadow: 
            0 0 8px #4facfe,
            0 0 15px rgba(79,172,254,0.5);
        background: rgba(255,255,255,0.08);
    }

    button {
        width: 100%;
        padding: 12px;
        margin-top: 20px;
        border: none;
        border-radius: 10px;
        background: linear-gradient(135deg, #4facfe, #00c6ff);
        color: white;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
        box-shadow: 
            0 0 10px rgba(79,172,254,0.7),
            0 0 25px rgba(79,172,254,0.4);
    }

    button:hover {
        transform: translateY(-2px) scale(1.03);
        box-shadow: 
            0 0 20px rgba(79,172,254,1),
            0 0 40px rgba(0,198,255,0.8);
    }

    button:active {
        transform: scale(0.97);
    }
</style>
</head>
<body>

<div class="login-container">
    <h2>iniciar sesion</h2>

    <input id="usuario" placeholder="Usuario">
    <input id="password" type="password" placeholder="Contraseña">

    <button onclick="login()">Ingresar</button>
</div>

<script>
function login(){

    const usuario = document.getElementById("usuario").value;
    const password = document.getElementById("password").value;

    fetch("/login", {
        method:"POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({usuario, password})
    })
    .then(r=>r.json())
    .then(data=>{

        if(data.ok){
            localStorage.setItem("logueado", "true");

            // 🔥 AQUÍ ESTÁ EL FIX
            window.location.href = "/index.html";

        }else{
            alert("❌ Usuario o contraseña incorrectos");
        }

    })
    .catch(()=> alert("Error en login"));
}
</script>
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/sw.js")
    .then(() => console.log("SW listo"))
    .catch(err => console.log("SW error", err));
}
</script>
</body>
</html>
